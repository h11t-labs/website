name: Deploy to GitHub Pages

on:
  # Deploy on every push to the default branch
  push:
    branches: [main]
  # ...and allow manual runs from the Actions tab
  workflow_dispatch:

# Least-privilege token, plus what Pages deployment needs (OIDC)
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let an in-progress deploy finish rather than cancelling it
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22 # project requires >=22.12 (see package.json engines)
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build # astro build + strips the dev-only /system page

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
